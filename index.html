<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Családfakutatás - Prémium Chat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --dark-brown: #2C1A11;
            --medium-brown: #4A3225;
            --light-brown: #5C4033;
            --gold: #D4AF37;
            --light-gold: #F3E5AB;
            --bg-sand: #F9F6F0;
            --text-dark: #332211;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-sand);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Globális Értesítési Sáv */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--dark-brown);
            color: white;
            border: 1px solid var(--gold);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            display: none;
            font-size: 0.9rem;
        }

        .view-container {
            display: none;
            width: 100%;
            height: 100vh;
        }

        /* --- AUTH STÍLUSOK --- */
        .auth-card {
            background: var(--dark-brown);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: auto;
        }
        .auth-card h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--gold);
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: white;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--light-gold);
            background: rgba(255,255,255,0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .btn-gold {
            background: linear-gradient(45deg, #B8860B, #D4AF37);
            color: var(--dark-brown);
        }
        .btn-gold:hover {
            background: linear-gradient(45deg, #D4AF37, #F3E5AB);
            transform: translateY(-2px);
        }
        .btn-google {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
        }
        .btn-google:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        .toggle-link {
            color: var(--light-gold);
            cursor: pointer;
            margin-top: 15px;
            display: inline-block;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* --- CHAT STÍLUSOK --- */
        .panel-header {
            background: var(--dark-brown);
            color: var(--gold);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            font-family: 'Cinzel', serif;
        }
        .logout-btn {
            background: #8B0000;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            width: auto;
            margin: 0;
        }
        .chat-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #FFFDF9;
            display: flex;
            flex-direction: column;
        }
        .msg-bubble {
            margin: 8px 0;
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 60%;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
            word-wrap: break-word;
        }
        .msg-pending {
            opacity: 0.6;
            font-style: italic;
        }
        .msg-client {
            background: var(--medium-brown);
            color: var(--light-gold);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .msg-admin {
            background: white;
            color: var(--dark-brown);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #E0D6C8;
        }
        .input-bar {
            padding: 20px 30px;
            background: var(--bg-sand);
            border-top: 1px solid #E0D6C8;
            display: flex;
            gap: 15px;
        }
        .input-bar input {
            color: var(--text-dark);
            background: white;
            border: 1px solid var(--medium-brown);
        }
        .input-bar button {
            width: 150px;
            margin: 0;
        }

        /* --- ADMIN PANELS STÍLUSOK --- */
        .admin-layout {
            display: flex;
            height: calc(100vh - 61px);
        }
        .sidebar {
            width: 320px;
            background: var(--medium-brown);
            border-right: 2px solid var(--gold);
            overflow-y: auto;
        }
        .thread-item {
            padding: 20px;
            border-bottom: 1px solid rgba(214, 175, 55, 0.2);
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .thread-item:hover, .thread-item.active {
            background: var(--dark-brown);
            color: var(--gold);
            border-left: 4px solid var(--gold);
        }
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #FFFDF9;
        }
        .read-only-banner {
            background: #7A1E1E;
            color: #FFD2D2;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-notification"></div>

    <div id="view-auth" class="view-container" style="display: flex;">
        <div class="auth-card">
            <h2 id="auth-title">Családfakutatás</h2>
            <input type="email" id="auth-email" placeholder="E-mail cím">
            <input type="password" id="auth-password" placeholder="Jelszó">
            <button class="btn-gold" id="auth-submit-btn" onclick="handleAuth()">Bejelentkezés</button>
            <button class="btn-google" onclick="loginWithGoogle()">Belépés Google fiókkal</button>
            <span class="toggle-link" id="auth-toggle" onclick="toggleAuthMode()">Nincs még fiókja? Regisztráció</span>
        </div>
    </div>

    <div id="view-chat" class="view-container">
        <div class="chat-layout">
            <div class="panel-header">
                <h3 style="margin:0;">Kapcsolatfelvétel</h3>
                <span id="client-user-email" style="color: var(--light-gold);"></span>
                <button class="logout-btn" onclick="logout()">Kijelentkezés</button>
            </div>
            <div class="chat-area" id="client-chat-area"></div>
            <div class="input-bar">
                <input type="text" id="client-msg-input" placeholder="Írja meg üzenetét itt..." onkeypress="if(event.key === 'Enter') sendClientMsg()">
                <button class="btn-gold" onclick="sendClientMsg()">Küldés</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="view-container">
        <div class="panel-header">
            <h3 style="margin:0; letter-spacing: 2px;">ADMINISZTRÁCIÓS PANEL</h3>
            <span id="admin-user-email" style="color: var(--gold);"></span>
            <button class="logout-btn" onclick="logout()">Kilépés</button>
        </div>
        <div class="admin-layout">
            <div class="sidebar" id="admin-sidebar"></div>
            <div class="admin-main">
                <div id="admin-notice" class="read-only-banner" style="display: none;">CSAK MEGTEKINTÉSI JOG (ÍRÁS LETILTVA)</div>
                <div class="chat-area" id="admin-chat-area" style="flex:1;">
                    <div style="text-align: center; color: #aaa; margin-top: 50px;">Kérjük, válasszon egy ügyfelet a bal oldali listából.</div>
                </div>
                <div class="input-bar" id="admin-input-bar">
                    <input type="text" id="admin-msg-input" placeholder="Válasz küldése az ügyfélnek..." onkeypress="if(event.key === 'Enter') sendAdminMsg()">
                    <button class="btn-gold" onclick="sendAdminMsg()">Válasz</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Konfiguráció
        const firebaseConfig = {
          apiKey: "AIzaSyCbwYmAgwlZrREyFqDCKajOCWzZmYx6FnM",
          authDomain: "csaladi-naptar-9f58a.firebaseapp.com",
          projectId: "csaladi-naptar-9f58a",
          storageBucket: "csaladi-naptar-9f58a.firebasestorage.app",
          messagingSenderId: "299884351675",
          appId: "1:299884351675:web:2b6d800b5ad9c0b3c3199e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLoginMode = true;
        let currentUser = null;
        let activeAdminChatId = null;
        let adminMessagesListener = null;
        let clientMessagesListener = null;

        // Vizuális értesítés függvény
        function showToast(text, duration = 5000) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, duration);
        }

        // --- AUTH ÁLLAPOT FIGYELŐ ---
        auth.onAuthStateChanged(user => {
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('view-chat').style.display = 'none';
            document.getElementById('view-admin').style.display = 'none';

            if(clientMessagesListener) { clientMessagesListener(); clientMessagesListener = null; }
            if(adminMessagesListener) { adminMessagesListener(); adminMessagesListener = null; }

            if (!user) {
                document.getElementById('view-auth').style.display = 'flex';
                currentUser = null;
            } else {
                currentUser = user;
                const email = user.email.toLowerCase();

                if (email === 'admin@csaladfakutatas.hu' || email === 'admin.permission@csaladfakutatas.hu' || email === 'admin.permission@csaladfakutatás.hu') {
                    document.getElementById('view-admin').style.display = 'block';
                    document.getElementById('admin-user-email').innerText = user.email;
                    
                    if (email.includes('permission')) {
                        document.getElementById('admin-input-bar').style.display = 'none';
                        document.getElementById('admin-notice').style.display = 'block';
                    } else {
                        document.getElementById('admin-input-bar').style.display = 'flex';
                        document.getElementById('admin-notice').style.display = 'none';
                    }
                    initAdminPanel();
                } else {
                    document.getElementById('view-chat').style.display = 'block';
                    document.getElementById('client-user-email').innerText = user.email;
                    initClientChat();
                }
            }
        });

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Családfakutatás' : 'Regisztráció';
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? 'Bejelentkezés' : 'Regisztráció indítása';
            document.getElementById('auth-toggle').innerText = isLoginMode ? 'Nincs még fiókja? Regisztráció' : 'Már van fiókom? Bejelentkezés';
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showToast('Kérjük, töltsön ki minden mezőt!');

            if(isLoginMode) {
                auth.signInWithEmailAndPassword(email, password).catch(err => showToast("Hiba: " + err.message));
            } else {
                auth.createUserWithEmailAndPassword(email, password).catch(err => showToast("Hiba: " + err.message));
            }
        }

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => showToast("Google Hiba: " + err.message));
        }

        function logout() {
            auth.signOut();
        }

        // --- ÜGYFÉL CHAT ---
        function initClientChat() {
            const area = document.getElementById('client-chat-area');
            
            clientMessagesListener = db.collection("messages")
              .where("chatId", "==", currentUser.email)
              .orderBy("timestamp", "asc")
              .onSnapshot(snapshot => {
                  // Töröljük az ideiglenes elemeket, ha megjött a valódi adat
                  area.innerHTML = '';
                  if(snapshot.empty) {
                      area.innerHTML = '<div style="text-align:center;color:#aaa;margin-top:20px;">Nincs még üzenet. Írjon nekünk!</div>';
                  }
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const div = document.createElement('div');
                      div.className = `msg-bubble ${data.sender === currentUser.email ? 'msg-client' : 'msg-admin'}`;
                      div.innerText = data.text;
                      area.appendChild(div);
                  });
                  area.scrollTop = area.scrollHeight;
              }, error => {
                  console.error("Firestore hiba:", error);
                  showToast("Indexelés szükséges! Ellenőrizze a böngésző konzolt (F12) a linkért.");
              });
        }

        function sendClientMsg() {
            const input = document.getElementById('client-msg-input');
            const text = input.value.trim();
            if(!text) return;

            const area = document.getElementById('client-chat-area');

            // 1. AZONNALI VIZUÁLIS VISSZAJELZÉS (Helyi elem hozzáadása a képernyőhöz)
            const tempDiv = document.createElement('div');
            tempDiv.className = 'msg-bubble msg-client msg-pending';
            tempDiv.innerText = text + " (Küldés...)";
            area.appendChild(tempDiv);
            area.scrollTop = area.scrollHeight;

            input.value = '';

            // 2. MENTÉS FIRESTORE-BA
            db.collection("messages").add({
                chatId: currentUser.email,
                sender: currentUser.email,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                showToast("Üzenet sikeresen elküldve!", 2000);
                return db.collection("chats").doc(currentUser.email).set({
                    chatId: currentUser.email,
                    lastMessage: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }).catch(err => {
                tempDiv.remove(); // Hiba esetén töröljük az ideiglenes buborékot
                showToast("Hiba történt: " + err.message);
            });
        }

        // --- ADMIN PANEL ---
        function initAdminPanel() {
            db.collection("chats")
              .orderBy("timestamp", "desc")
              .onSnapshot(snapshot => {
                  const sidebar = document.getElementById('admin-sidebar');
                  sidebar.innerHTML = '';
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const div = document.createElement('div');
                      div.className = `thread-item ${activeAdminChatId === data.chatId ? 'active' : ''}`;
                      div.innerText = data.chatId;
                      div.onclick = () => selectAdminChat(data.chatId, div);
                      sidebar.appendChild(div);
                  });
              }, error => {
                  showToast("Hiba a listázáskor: " + error.message);
              });
        }

        function selectAdminChat(chatId, element) {
            activeAdminChatId = chatId;
            document.querySelectorAll('.thread-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if(adminMessagesListener) adminMessagesListener();

            const area = document.getElementById('admin-chat-area');

            adminMessagesListener = db.collection("messages")
              .where("chatId", "==", chatId)
              .orderBy("timestamp", "asc")
              .onSnapshot(snapshot => {
                  area.innerHTML = '';
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const div = document.createElement('div');
                      div.className = `msg-bubble ${data.sender === chatId ? 'msg-admin' : 'msg-client'}`;
                      div.innerText = data.text;
                      area.appendChild(div);
                  });
                  area.scrollTop = area.scrollHeight;
              }, error => {
                  showToast("Nem sikerült betölteni az üzeneteket. Index szükséges.");
              });
        }

        function sendAdminMsg() {
            if(currentUser.email.toLowerCase().includes('permission')) return;
            if(!activeAdminChatId) return showToast('Válasszon ki egy beszélgetést!');

            const input = document.getElementById('admin-msg-input');
            const text = input.value.trim();
            if(!text) return;

            const area = document.getElementById('admin-chat-area');

            // Azonnali helyi visszajelzés az adminnak is
            const tempDiv = document.createElement('div');
            tempDiv.className = 'msg-bubble msg-client msg-pending';
            tempDiv.innerText = text + " (Küldés...)";
            area.appendChild(tempDiv);
            area.scrollTop = area.scrollHeight;

            input.value = '';

            db.collection("messages").add({
                chatId: activeAdminChatId,
                sender: currentUser.email,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                return db.collection("chats").doc(activeAdminChatId).update({
                    lastMessage: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }).catch(err => {
                tempDiv.remove();
                showToast("Hiba küldéskor: " + err.message);
            });
        }
    </script>
</body>
</html>
